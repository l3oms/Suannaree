<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชี สรวลนารี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .print-padding { padding: 0 !important; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="main-app" class="max-w-md mx-auto p-4 pb-10 print-padding">
        
        <header class="flex justify-between items-center mb-4 no-print">
            <div>
                <h1 class="text-xl font-bold text-slate-900">สรุปบัญชี สรวลนารี</h1>
                <p id="loading-status" class="text-xs text-slate-500">สถานะ: กำลังโหลดข้อมูล...</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="window.print()" class="text-xs bg-white border border-slate-200 text-slate-700 px-3 py-2 rounded-xl shadow-sm hover:bg-slate-50">พิมพ์</button>
                <button onclick="exportToCSV()" class="text-xs bg-white border border-slate-200 text-slate-700 px-3 py-2 rounded-xl shadow-sm hover:bg-slate-50">ส่งออก</button>
            </div>
        </header>

        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm mb-6 no-print">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 id="form-title" class="font-bold text-slate-800">บันทึกรายการใหม่</h2>
                <button onclick="resetForm()" id="cancel-edit-btn" class="hidden text-xs text-rose-600 font-semibold bg-rose-50 px-2 py-1 rounded">ยกเลิกการแก้ไข</button>
            </div>
            
            <input type="hidden" id="form-id">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ประเภท</label>
                    <select id="form-type" onchange="updateCategories()" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 bg-slate-50">
                        <option value="รายรับ">รายรับ</option>
                        <option value="รายจ่าย">รายจ่าย</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">หมวดหมู่</label>
                    <select id="form-category" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 bg-slate-50">
                        </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">วันที่</label>
                    <input type="date" id="form-date" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 bg-slate-50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">จำนวนเงิน (บาท)</label>
                    <input type="number" id="form-amount" step="any" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 bg-slate-50" placeholder="0.00">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-xs font-semibold text-slate-500 mb-1">หมายเหตุ (ถ้ามี)</label>
                <input type="text" id="form-note" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900 bg-slate-50" placeholder="รายละเอียดเพิ่มเติม">
            </div>
            <button id="submit-btn" onclick="submitForm()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-semibold hover:bg-slate-800 transition text-sm shadow-md">บันทึกข้อมูล</button>
        </div>

        <hr class="border-slate-200 mb-6 no-print">

        <div id="filter-bar" class="flex overflow-x-auto space-x-2 mb-5 no-print pb-2">
            <button onclick="setFilter('day', this)" class="filter-btn bg-slate-900 text-white px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap shadow-sm">วันนี้</button>
            <button onclick="setFilter('week', this)" class="filter-btn bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">สัปดาห์นี้</button>
            <button onclick="setFilter('month', this)" class="filter-btn bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">เดือนนี้</button>
            <button onclick="setFilter('half-year', this)" class="filter-btn bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">ครึ่งปี</button>
            <button onclick="setFilter('year', this)" class="filter-btn bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">1 ปี</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                <p class="text-xs font-semibold text-slate-500 mb-1">รายรับรวม</p>
                <p id="total-income" class="text-lg font-bold text-emerald-600">฿0.00</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm text-center">
                <p class="text-xs font-semibold text-slate-500 mb-1">รายจ่ายรวม</p>
                <p id="total-expense" class="text-lg font-bold text-rose-600">฿0.00</p>
            </div>
        </div>
        <div id="profit-card" class="bg-slate-900 p-5 rounded-2xl text-white mb-6 shadow-md text-center transition-all">
            <p class="text-xs text-slate-400 mb-1">สรุปกำไร / ขาดทุน</p>
            <p id="net-profit" class="text-3xl font-bold">฿0.00</p>
        </div>

        <h3 class="font-bold text-slate-800 text-sm mb-3">ประวัติรายการ</h3>
        <div id="transaction-list" class="space-y-2">
            </div>

    </div>

    <script>
        // ใช้ API URL ของคุณโดยตรง
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyIUcTyIsVsAAIK4B2cvlcCTtORhE21mdI0cxX-LwMBFoD6S67SA2-dcYWEXSvRLSOt/exec";
        
        let allTransactions = [];
        let currentFilter = 'day';

        // หมวดหมู่ตามเงื่อนไขที่กำหนด
        const categoriesData = {
            'รายรับ': ['เงินสด', 'เงินโอน'],
            'รายจ่าย': ['พนักงาน', 'ตลาด', 'อื่นๆ']
        };

        function updateCategories() {
            const type = document.getElementById('form-type').value;
            const catSelect = document.getElementById('form-category');
            catSelect.innerHTML = '';
            
            categoriesData[type].forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.innerText = c;
                catSelect.appendChild(opt);
            });
        }

        // โหลดข้อมูลอัตโนมัติเมื่อเปิดหน้าเว็บ
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            updateCategories();
            fetchData();
        });

        async function fetchData() {
            document.getElementById('loading-status').innerText = "สถานะ: กำลังอัปเดตข้อมูล...";
            try {
                const response = await fetch(GOOGLE_API_URL);
                allTransactions = await response.json();
                renderApp();
                document.getElementById('loading-status').innerText = "สถานะ: ข้อมูลล่าสุดพร้อมใช้งาน";
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading-status').innerText = "สถานะ: เชื่อมต่อล้มเหลว";
            }
        }

        function setFilter(filterType, btnElement) {
            currentFilter = filterType;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-900', 'text-white');
                btn.classList.add('bg-white', 'border', 'border-slate-200', 'text-slate-600');
            });
            btnElement.classList.remove('bg-white', 'border', 'border-slate-200', 'text-slate-600');
            btnElement.classList.add('bg-slate-900', 'text-white', 'shadow-sm');
            renderApp();
        }

        function renderApp() {
            const now = new Date();
            const filtered = allTransactions.filter(txn => {
                const txnDate = new Date(txn.date);
                const diffTime = now - txnDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (currentFilter === 'day') return now.toDateString() === txnDate.toDateString();
                if (currentFilter === 'week') return diffDays <= 7;
                if (currentFilter === 'month') return now.getMonth() === txnDate.getMonth() && now.getFullYear() === txnDate.getFullYear();
                if (currentFilter === 'half-year') return diffDays <= 182;
                if (currentFilter === 'year') return diffDays <= 365;
                return true;
            });

            let income = 0;
            let expense = 0;
            const listContainer = document.getElementById('transaction-list');
            listContainer.innerHTML = '';

            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(txn => {
                const isIncome = txn.type === 'รายรับ';
                if (isIncome) income += txn.amount;
                else expense += txn.amount;

                const item = document.createElement('div');
                item.className = "bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center";
                item.innerHTML = `
                    <div>
                        <div class="flex items-center space-x-2">
                            <span class="text-[10px] px-2 py-0.5 rounded bg-slate-100 text-slate-600 font-semibold">${txn.category}</span>
                            <span class="text-xs text-slate-400">${formatThaiDate(txn.date)}</span>
                        </div>
                        <p class="font-semibold text-slate-800 text-sm mt-1">${txn.note || '-'}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isIncome ? '+' : '-'}฿${txn.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </p>
                        <div class="text-[11px] font-medium mt-1.5 space-x-3 no-print">
                            <button onclick="editTransaction('${txn.id}')" class="text-slate-400 hover:text-slate-900">แก้ไข</button>
                            <button onclick="deleteTransaction('${txn.id}')" class="text-slate-400 hover:text-rose-600">ลบ</button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });

            if(filtered.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-sm text-slate-400 py-6 border border-dashed border-slate-200 rounded-xl">ไม่มีรายการในช่วงเวลานี้</p>`;
            }

            const net = income - expense;
            document.getElementById('total-income').innerText = `฿${income.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('total-expense').innerText = `฿${expense.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const netProfitEl = document.getElementById('net-profit');
            const profitCard = document.getElementById('profit-card');
            netProfitEl.innerText = `${net >= 0 ? '+' : ''}฿${net.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            if (net >= 0) {
                profitCard.className = "bg-slate-900 p-5 rounded-2xl text-white mb-6 shadow-md text-center";
            } else {
                profitCard.className = "bg-rose-900 p-5 rounded-2xl text-white mb-6 shadow-md text-center";
            }
        }

        async function submitForm() {
            const id = document.getElementById('form-id').value;
            const type = document.getElementById('form-type').value;
            const category = document.getElementById('form-category').value;
            const amount = Number(document.getElementById('form-amount').value);
            const date = document.getElementById('form-date').value;
            const note = document.getElementById('form-note').value;

            if(!amount || !date) { 
                alert('กรุณาระบุจำนวนเงิน'); 
                document.getElementById('form-amount').focus();
                return; 
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";
            document.getElementById('loading-status').innerText = "สถานะ: กำลังบันทึกลงฐานข้อมูล...";

            const payload = {
                action: id ? 'edit' : 'add',
                id: id,
                type: type,
                category: category,
                amount: amount,
                date: date,
                note: note
            };

            await fetch(GOOGLE_API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            resetForm();
            await fetchData();
            btn.disabled = false;
        }

        function editTransaction(id) {
            const txn = allTransactions.find(t => t.id === id);
            if (txn) {
                document.getElementById('form-title').innerText = "แก้ไขรายการ";
                document.getElementById('form-id').value = txn.id;
                document.getElementById('form-type').value = txn.type;
                updateCategories();
                document.getElementById('form-category').value = txn.category;
                document.getElementById('form-amount').value = txn.amount;
                document.getElementById('form-date').value = txn.date.split('T')[0];
                document.getElementById('form-note').value = txn.note;
                
                document.getElementById('submit-btn').innerText = "บันทึกการแก้ไข";
                document.getElementById('submit-btn').classList.replace('bg-slate-900', 'bg-amber-600');
                document.getElementById('submit-btn').classList.replace('hover:bg-slate-800', 'hover:bg-amber-700');
                document.getElementById('cancel-edit-btn').classList.remove('hidden');

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "บันทึกรายการใหม่";
            document.getElementById('form-id').value = '';
            document.getElementById('form-amount').value = '';
            document.getElementById('form-note').value = '';
            document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            
            document.getElementById('submit-btn').innerText = "บันทึกข้อมูล";
            document.getElementById('submit-btn').classList.replace('bg-amber-600', 'bg-slate-900');
            document.getElementById('submit-btn').classList.replace('hover:bg-amber-700', 'hover:bg-slate-800');
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        async function deleteTransaction(id) {
            if(!confirm('ยืนยันการลบรายการนี้ใช่หรือไม่?')) return;
            document.getElementById('loading-status').innerText = "สถานะ: กำลังลบข้อมูล...";
            
            await fetch(GOOGLE_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id })
            });

            fetchData();
        }

        function exportToCSV() {
            let csv = 'ID,วันที่,ประเภท,หมวดหมู่,จำนวนเงิน,หมายเหตุ\n';
            allTransactions.forEach(t => {
                csv += `${t.id},${t.date.split('T')[0]},${t.type},${t.category},${t.amount},${t.note || ''}\n`;
            });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `บัญชีสรวลนารี_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function formatThaiDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: '2-digit' });
        }
    </script>
</body>
</html>
