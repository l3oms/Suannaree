<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สรวลนารี | บัญชีร้าน</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2=family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background-color: #f8fafc; }
        .bank-card { border-radius: 1rem; }
        .active-tab { color: #4338ca; border-top: 2px solid #4338ca; }
    </style>
</head>
<body class="text-slate-800 pb-24">

    <nav class="bg-indigo-900 text-white pt-6 pb-10 px-4 rounded-b-[2rem] shadow-lg">
        <div class="w-full flex justify-between items-center">
            <div>
                <p class="text-indigo-200 text-xs">ระบบบัญชี</p>
                <h1 class="text-xl font-bold text-white">ร้านสรวลนารี</h1>
            </div>
            <div class="text-right">
                <p id="display-date" class="text-xs text-indigo-200"></p>
            </div>
        </div>
    </nav>

    <div id="page-input" class="w-full px-3 -mt-6 space-y-4">
        <div class="bg-white p-4 bank-card shadow-sm border border-slate-100">
            <div class="grid grid-cols-3 divide-x divide-slate-100 text-center">
                <div>
                    <p class="text-slate-400 text-[10px] font-semibold mb-1">รายรับวันนี้</p>
                    <p id="total-income" class="text-sm font-bold text-emerald-600">฿0</p>
                </div>
                <div>
                    <p class="text-slate-400 text-[10px] font-semibold mb-1">รายจ่ายวันนี้</p>
                    <p id="total-expense" class="text-sm font-bold text-rose-600">฿0</p>
                </div>
                <div class="bg-indigo-50/50 rounded-r-lg">
                    <p class="text-indigo-600 text-[10px] font-semibold mb-1">คงเหลือ</p>
                    <p id="total-balance" class="text-sm font-bold text-indigo-950">฿0</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 bank-card shadow-md border border-slate-100">
            <h2 class="text-md font-bold mb-4 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-indigo-600 rounded-full"></span>
                บันทึกรายการใหม่
            </h2>
            <form id="tx-form" class="space-y-4">
                <div>
                    <label class="text-[11px] font-semibold text-slate-500 block mb-1">เลือกวันที่</label>
                    <input type="date" id="date" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500 block mb-1">ประเภทรายการ</label>
                    <div class="flex gap-2">
                        <button type="button" onclick="setType('income')" id="btn-inc" class="flex-1 py-2 text-sm rounded-xl font-bold border border-emerald-500 text-emerald-600 bg-emerald-50">รายรับ</button>
                        <button type="button" onclick="setType('expense')" id="btn-exp" class="flex-1 py-2 text-sm rounded-xl font-bold border border-transparent bg-slate-100 text-slate-500">รายจ่าย</button>
                    </div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500 block mb-1">เลือกหมวดหมู่</label>
                    <div id="category-container" class="flex flex-wrap gap-2"></div>
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500 block mb-1">รายละเอียดเพิ่มเติม</label>
                    <input type="text" id="desc" placeholder="ระบุเพิ่มเติม (ถ้ามี)..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm outline-none">
                </div>
                <div>
                    <label class="text-[11px] font-semibold text-slate-500 block mb-1">จำนวนเงิน (บาท)</label>
                    <input type="number" id="amt" step="0.01" placeholder="0.00" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-lg font-bold text-indigo-900 outline-none">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-md text-sm">
                    บันทึกรายการ
                </button>
            </form>
        </div>

        <div class="bg-white p-4 bank-card shadow-md border border-slate-100">
            <h2 class="text-sm font-bold text-slate-500 mb-3">รายการของวันนี้</h2>
            <div id="tx-list-today" class="divide-y divide-slate-100"></div>
        </div>
    </div>


    <div id="page-history" class="w-full px-3 -mt-6 space-y-4 hidden">
        <div class="bg-white p-4 bank-card shadow-md border border-slate-100">
            <h2 class="text-md font-bold mb-3 flex items-center gap-2">
                <span class="w-1.5 h-5 bg-amber-500 rounded-full"></span>
                เลือกช่วงเวลาดูย้อนหลัง
            </h2>
            <div class="grid grid-cols-2 gap-2 mb-3">
                <div>
                    <label class="text-[10px] font-semibold text-slate-400 block mb-1">จากวันที่</label>
                    <input type="date" id="history-start-date" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-semibold text-slate-400 block mb-1">ถึงวันที่</label>
                    <input type="date" id="history-end-date" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-xs outline-none">
                </div>
            </div>
            <button onclick="updateHistoryUI()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2 rounded-xl text-xs">
                ดึงข้อมูลประวัติ
            </button>
        </div>

        <div class="bg-slate-900 text-white p-4 bank-card shadow-lg">
            <p class="text-center text-xs text-slate-400 mb-2 font-medium">สรุปยอดตามช่วงเวลาที่เลือก</p>
            <div class="grid grid-cols-3 text-center divide-x divide-slate-800">
                <div>
                    <p class="text-[10px] text-emerald-400">รายรับรวม</p>
                    <p id="hist-total-income" class="text-sm font-bold text-emerald-400">฿0</p>
                </div>
                <div>
                    <p class="text-[10px] text-rose-400">รายจ่ายรวม</p>
                    <p id="hist-total-expense" class="text-sm font-bold text-rose-400">฿0</p>
                </div>
                <div>
                    <p class="text-[10px] text-amber-400">กำไรสุทธิ</p>
                    <p id="hist-total-balance" class="text-sm font-bold text-amber-400">฿0</p>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 bank-card shadow-md border border-slate-100 min-h-[300px]">
            <h2 class="text-sm font-bold text-slate-600 mb-3">รายการเดินบัญชี (Statement)</h2>
            <div id="history-tx-list" class="divide-y divide-slate-100"></div>
            <div id="history-empty-msg" class="text-center py-12 text-slate-400 hidden text-xs">
                ไม่มีรายการในช่วงเวลาดังกล่าว
            </div>
        </div>
    </div>


    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-xl h-16 flex items-center justify-around z-50">
        <button onclick="switchTab('input')" id="nav-input" class="flex flex-col items-center justify-center w-1/2 h-full active-tab text-slate-600 transition-all">
            <span class="text-lg font-bold">📝</span>
            <span class="text-[11px] font-bold">บันทึกรายการ</span>
        </button>
        <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center justify-center w-1/2 h-full text-slate-400 transition-all">
            <span class="text-lg font-bold">📊</span>
            <span class="text-[11px] font-bold">ประวัติย้อนหลัง</span>
        </button>
    </div>

    <script>
        let currentType = 'income';
        let selectedCategory = '';
        let txs = JSON.parse(localStorage.getItem('sn_accounts')) || [];
        
        const categories = {
            income: ['เงินสด', 'เงินโอน'],
            expense: ['พนักงาน', 'ตลาด', 'ค่าเครื่องดื่ม', 'อื่นๆ']
        };

        // ตั้งเวลาเริ่มต้น
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('date').value = todayStr;
        document.getElementById('display-date').innerText = new Date().toLocaleDateString('th-TH', { dateStyle: 'medium' });

        // ตั้งวันที่ย้อนหลังให้เริ่มต้นเป็น วันแรกของเดือน จนถึง วันปัจจุบัน
        const firstDayOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('history-start-date').value = firstDayOfMonth;
        document.getElementById('history-end-date').value = todayStr;

        function switchTab(tab) {
            const pageInput = document.getElementById('page-input');
            const pageHistory = document.getElementById('page-history');
            const navInput = document.getElementById('nav-input');
            const navHistory = document.getElementById('nav-history');

            if(tab === 'input') {
                pageInput.classList.remove('hidden');
                pageHistory.classList.add('hidden');
                navInput.className = "flex flex-col items-center justify-center w-1/2 h-full active-tab text-indigo-700";
                navHistory.className = "flex flex-col items-center justify-center w-1/2 h-full text-slate-400";
                updateUI();
            } else {
                pageInput.classList.add('hidden');
                pageHistory.classList.remove('hidden');
                navHistory.className = "flex flex-col items-center justify-center w-1/2 h-full active-tab text-indigo-700";
                navInput.className = "flex flex-col items-center justify-center w-1/2 h-full text-slate-400";
                updateHistoryUI();
            }
        }

        function setType(type) {
            currentType = type;
            const bInc = document.getElementById('btn-inc');
            const bExp = document.getElementById('btn-exp');

            if(type === 'income') {
                bInc.className = 'flex-1 py-2 text-sm rounded-xl font-bold border border-emerald-500 text-emerald-600 bg-emerald-50';
                bExp.className = 'flex-1 py-2 text-sm rounded-xl font-bold border border-transparent bg-slate-100 text-slate-500';
            } else {
                bExp.className = 'flex-1 py-2 text-sm rounded-xl font-bold border border-rose-500 text-rose-600 bg-rose-50';
                bInc.className = 'flex-1 py-2 text-sm rounded-xl font-bold border border-transparent bg-slate-100 text-slate-500';
            }
            selectedCategory = categories[type][0];
            renderCategoryButtons();
        }

        function selectCategory(cat) {
            selectedCategory = cat;
            renderCategoryButtons();
        }

        function renderCategoryButtons() {
            const container = document.getElementById('category-container');
            const activeColor = currentType === 'income' ? 'bg-emerald-600 text-white border-emerald-600 shadow-sm' : 'bg-rose-600 text-white border-rose-600 shadow-sm';
            
            container.innerHTML = categories[currentType].map(c => {
                const isSelected = c === selectedCategory;
                return `<button type="button" onclick="selectCategory('${c}')" class="px-4 py-2 text-xs font-semibold rounded-xl border transition-all ${isSelected ? activeColor : 'bg-slate-50 border-slate-200 text-slate-600'}">${c}</button>`;
            }).join('');
        }

        // หน้าบอร์ดหลักประจำวัน
        function updateUI() {
            const listToday = document.getElementById('tx-list-today');
            const filteredToday = txs.filter(t => t.date === todayStr);
            let incSum = 0, expSum = 0;
            
            listToday.innerHTML = filteredToday.length === 0 ? '<p class="text-center py-6 text-xs text-slate-400">ยังไม่มีรายการบันทึกของวันนี้</p>' : '';

            filteredToday.sort((a, b) => b.ts - a.ts).forEach((t) => {
                const isInc = t.type === 'income';
                if(isInc) incSum += t.amt; else expSum += t.amt;
                listToday.appendChild(createRowItem(t));
            });

            document.getElementById('total-income').innerText = `฿${incSum.toLocaleString()}`;
            document.getElementById('total-expense').innerText = `฿${expSum.toLocaleString()}`;
            document.getElementById('total-balance').innerText = `฿${(incSum - expSum).toLocaleString()}`;
            localStorage.setItem('sn_accounts', JSON.stringify(txs));
        }

        // หน้ารายงานย้อนหลังตามช่วงเวลา
        function updateHistoryUI() {
            const histList = document.getElementById('history-tx-list');
            const emptyMsg = document.getElementById('history-empty-msg');
            const start = document.getElementById('history-start-date').value;
            const end = document.getElementById('history-end-date').value;

            // กรองข้อมูลที่อยู่ในช่วงวันที่กำหนด
            const filtered = txs.filter(t => t.date >= start && t.date <= end);
            let incSum = 0, expSum = 0;
            histList.innerHTML = '';

            if (filtered.length === 0) {
                emptyMsg.classList.remove('hidden');
            } else {
                emptyMsg.classList.add('hidden');
                // เรียงจากวันที่ล่าสุดลงไปหาอดีต
                filtered.sort((a, b) => b.date.localeCompare(a.date) || b.ts - a.ts).forEach(t => {
                    const isInc = t.type === 'income';
                    if(isInc) incSum += t.amt; else expSum += t.amt;
                    histList.appendChild(createRowItem(t, true)); // ส่ง true เพื่อบอกว่าให้โชว์วันที่ด้วย
                });
            }

            document.getElementById('hist-total-income').innerText = `฿${incSum.toLocaleString()}`;
            document.getElementById('hist-total-expense').innerText = `฿${expSum.toLocaleString()}`;
            document.getElementById('hist-total-balance').innerText = `฿${(incSum - expSum).toLocaleString()}`;
        }

        // ตัวสร้าง Component แถวรายการเงินเข้าออก
        function createRowItem(t, showDate = false) {
            const isInc = t.type === 'income';
            const row = document.createElement('div');
            row.className = 'flex justify-between items-center py-3';
            
            // แปลงฟอร์แมตวันที่แบบสั้นเพื่อแสดงผลในหน้าประวัติ
            const dateLabel = showDate ? `<span class="text-[9px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-normal mr-1">${t.date.substring(5)}</span>` : '';

            row.innerHTML = `
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold ${isInc ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                        ${t.cat.substring(0,2)}
                    </div>
                    <div>
                        <p class="text-sm font-bold text-slate-700">${dateLabel}${t.cat}</p>
                        <p class="text-[11px] text-slate-400">${t.desc || '-'}</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-sm font-bold ${isInc ? 'text-emerald-600' : 'text-rose-600'}">${isInc ? '+' : '-'} ฿${t.amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                    <button onclick="deleteTx(${t.ts})" class="text-[10px] text-slate-300 hover:text-rose-500 font-medium">ลบ</button>
                </div>
            `;
            return row;
        }

        document.getElementById('tx-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                date: document.getElementById('date').value,
                type: currentType,
                cat: selectedCategory,
                desc: document.getElementById('desc').value,
                amt: parseFloat(document.getElementById('amt').value),
                ts: Date.now()
            };
            txs.push(data);
            document.getElementById('amt').value = '';
            document.getElementById('desc').value = '';
            updateUI();
        });

        window.deleteTx = (ts) => {
            if(confirm('ลบรายการนี้?')) {
                txs = txs.filter(t => t.ts !== ts);
                updateUI();
                if(!document.getElementById('page-history').classList.contains('hidden')) {
                    updateHistoryUI();
                }
            }
        };

        setType('income');
        updateUI();
    </script>
</body>
</html>
