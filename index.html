<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกรายรับ-รายจ่ายทางการ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        @media print {
            .no-print { display: none !important; }
            .print-padding { padding: 0 !important; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="login-page" class="page active flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-100">
            <div class="text-center mb-6">
                <div class="bg-slate-900 text-white w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-3 text-xl font-bold">สรวง</div>
                <h2 class="text-xl font-bold text-slate-900">ระบบบัญชีรายรับ-รายจ่าย</h2>
                <p class="text-xs text-slate-400 mt-1">กรุณาเข้าสู่ระบบเพื่อจัดการข้อมูล</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ชื่อผู้ใช้งาน</label>
                    <input type="text" id="username" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">รหัสผ่าน</label>
                    <input type="password" id="password" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800 text-sm">
                </div>
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-semibold hover:bg-slate-800 transition text-sm shadow-md">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="page max-w-md mx-auto p-4 pb-24 print-padding">
        <header class="flex justify-between items-center mb-6 no-print">
            <div>
                <h1 class="text-lg font-bold text-slate-900">สรุปผลประกอบการ</h1>
                <p class="text-xs text-slate-400">อัปเดตเรียลไทม์ผ่าน Google Sheets</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="window.print()" class="text-xs bg-white border border-slate-200 text-slate-700 px-3 py-2 rounded-xl shadow-sm hover:bg-slate-50">พิมพ์/PDF</button>
                <button onclick="exportToCSV()" class="text-xs bg-white border border-slate-200 text-slate-700 px-3 py-2 rounded-xl shadow-sm hover:bg-slate-50">ส่งออก</button>
            </div>
        </header>

        <div id="filter-bar" class="flex overflow-x-auto space-x-2 mb-6 no-print pb-2">
            <button onclick="setFilter('day', this)" class="filter-btn bg-slate-900 text-white px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap shadow-sm">วันนี้</button>
            <button onclick="setFilter('week', this)" class="filter-btn bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">สัปดาห์นี้</button>
            <button onclick="setFilter('month', this)" class="filter-btn bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">เดือนนี้</button>
            <button onclick="setFilter('half-year', this)" class="filter-btn bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">ครึ่งปีแรก</button>
            <button onclick="setFilter('year', this)" class="filter-btn bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-full text-xs font-medium whitespace-nowrap">หนึ่งปี</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-3">
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs font-medium text-slate-400 mb-1">รายรับรวม</p>
                <p id="total-income" class="text-lg font-bold text-emerald-600">฿0.00</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-xs font-medium text-slate-400 mb-1">รายจ่ายรวม</p>
                <p id="total-expense" class="text-lg font-bold text-rose-600">฿0.00</p>
            </div>
        </div>
        <div id="profit-card" class="bg-slate-900 p-5 rounded-2xl text-white mb-6 shadow-md transition-all">
            <p class="text-xs text-slate-400 mb-1">กำไร / ขาดทุนสุทธิ</p>
            <p id="net-profit" class="text-2xl font-bold">฿0.00</p>
        </div>

        <div class="mb-3 flex justify-between items-center">
            <h3 class="font-bold text-slate-800 text-sm">ประวัติบันทึกรายการ</h3>
            <span id="loading-status" class="text-xs text-slate-400">กำลังโหลดข้อมูล...</span>
        </div>
        
        <div id="transaction-list" class="space-y-2">
            </div>

        <button onclick="openModal('add')" class="fixed bottom-6 right-6 bg-slate-900 text-white w-14 h-14 rounded-full shadow-xl text-2xl flex items-center justify-center hover:bg-slate-800 transition no-print">+</button>
    </div>

    <div id="tx-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50 no-print">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
            <h3 id="modal-title" class="text-base font-bold text-slate-900 mb-4">เพิ่มรายการใหม่</h3>
            <input type="hidden" id="form-id">
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ประเภท</label>
                    <select id="form-type" onchange="updateCategories()" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-950">
                        <option value="รายรับ">รายรับ</option>
                        <option value="รายจ่าย">รายจ่าย</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">หมวดหมู่</label>
                    <select id="form-category" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-950">
                        </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">จำนวนเงิน (บาท)</label>
                    <input type="number" id="form-amount" step="any" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-950" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">วันที่</label>
                    <input type="date" id="form-date" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-950">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">หมายเหตุ</label>
                    <input type="text" id="form-note" class="w-full p-2.5 border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-950" placeholder="ระบุรายละเอียดสั้นๆ">
                </div>
                <div class="flex space-x-2 pt-3">
                    <button onclick="closeModal()" class="w-1/2 border border-slate-200 text-slate-600 p-2.5 rounded-xl text-sm font-medium hover:bg-slate-50">ยกเลิก</button>
                    <button onclick="submitForm()" class="w-1/2 bg-slate-900 text-white p-2.5 rounded-xl text-sm font-medium hover:bg-slate-800">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ใส่ URL ที่ได้จาก Google Apps Script ของคุณโดยตรง
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbyIUcTyIsVsAAIK4B2cvlcCTtORhE21mdI0cxX-LwMBFoD6S67SA2-dcYWEXSvRLSOt/exec";
        
        let allTransactions = [];
        let currentFilter = 'day';

        // ระบบ Login ป้องกันความปลอดภัยเบื้องต้น
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user === 'admin' && pass === '1234') { // แก้ไข Username และ Password ของคุณได้ตรงนี้
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('main-app').classList.add('active');
                fetchData();
            } else {
                alert('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
            }
        }

        // โหลดข้อมูลทั้งหมดจากบัญชี Google Sheets เรียลไทม์
        async function fetchData() {
            document.getElementById('loading-status').innerText = "กำลังอัปเดต...";
            try {
                const response = await fetch(GOOGLE_API_URL);
                allTransactions = await response.json();
                renderApp();
                document.getElementById('loading-status').innerText = "ซิงค์ข้อมูลสำเร็จ";
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading-status').innerText = "เชื่อมต่อล้มเหลว";
            }
        }

        function setFilter(filterType, btnElement) {
            currentFilter = filterType;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-slate-900', 'text-white');
                btn.classList.add('bg-white', 'border', 'border-slate-200', 'text-slate-600');
            });
            btnElement.classList.remove('bg-white', 'border', 'border-slate-200', 'text-slate-600');
            btnElement.classList.add('bg-slate-900', 'text-white', 'shadow-sm');
            renderApp();
        }

        // คำนวณช่วงเวลาและอัปเดตหน้าจอแอป
        function renderApp() {
            const now = new Date();
            const filtered = allTransactions.filter(txn => {
                const txnDate = new Date(txn.date);
                const diffTime = now - txnDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (currentFilter === 'day') {
                    return now.toDateString() === txnDate.toDateString();
                } else if (currentFilter === 'week') {
                    return diffDays <= 7;
                } else if (currentFilter === 'month') {
                    return now.getMonth() === txnDate.getMonth() && now.getFullYear() === txnDate.getFullYear();
                } else if (currentFilter === 'half-year') {
                    // ครึ่งปีแรก/ย้อนหลัง 6 เดือน
                    return diffDays <= 182;
                } else if (currentFilter === 'year') {
                    return diffDays <= 365;
                }
                return true;
            });

            // คำนวณรายรับ รายจ่าย กำไร
            let income = 0;
            let expense = 0;
            const listContainer = document.getElementById('transaction-list');
            listContainer.innerHTML = '';

            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(txn => {
                const isIncome = txn.type === 'รายรับ';
                if (isIncome) income += txn.amount;
                else expense += txn.amount;

                // สร้างแถวรายการประวัติในมือถือ
                const item = document.createElement('div');
                item.className = "bg-white p-3.5 rounded-xl border border-slate-100 shadow-sm flex justify-between items-center";
                item.innerHTML = `
                    <div>
                        <p class="font-semibold text-slate-800 text-sm">${txn.note || txn.category}</p>
                        <p class="text-xs text-slate-400 mt-0.5">${formatThaiDate(txn.date)} • ${txn.category}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-sm ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isIncome ? '+' : '-'}฿${txn.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </p>
                        <div class="text-xs text-slate-400 mt-1 space-x-2 no-print">
                            <button onclick="openModal('edit', '${txn.id}')" class="hover:text-slate-900 underline">แก้ไข</button>
                            <button onclick="deleteTransaction('${txn.id}')" class="hover:text-rose-600 underline">ลบ</button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });

            if(filtered.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-xs text-slate-400 py-8">ไม่มีรายการในช่วงเวลานี้</p>`;
            }

            const net = income - expense;
            document.getElementById('total-income').innerText = `฿${income.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('total-expense').innerText = `฿${expense.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const netProfitEl = document.getElementById('net-profit');
            const profitCard = document.getElementById('profit-card');
            netProfitEl.innerText = `${net >= 0 ? '+' : ''}฿${net.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            if (net >= 0) {
                profitCard.className = "bg-slate-900 p-5 rounded-2xl text-white mb-6 shadow-md";
            } else {
                profitCard.className = "bg-rose-950 p-5 rounded-2xl text-white mb-6 shadow-md";
            }
        }

        // จัดการหมวดหมู่ย่อยให้สอดคล้องตามเงื่อนไขรายรับ/รายจ่ายที่คุณต้องการ
        function updateCategories() {
            const type = document.getElementById('form-type').value;
            const catSelect = document.getElementById('form-category');
            catSelect.innerHTML = '';
            
            const cats = type === 'รายรับ' ? ['เงินสด', 'เงินโอน'] : ['พนักงาน', 'ตลาด', 'อื่นๆ'];
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.innerText = c;
                catSelect.appendChild(opt);
            });
        }

        function openModal(mode, id = '') {
            document.getElementById('tx-modal').classList.remove('hidden');
            document.getElementById('tx-modal').classList.add('flex');
            document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            updateCategories();

            if (mode === 'add') {
                document.getElementById('modal-title').innerText = "เพิ่มรายการใหม่";
                document.getElementById('form-id').value = '';
                document.getElementById('form-amount').value = '';
                document.getElementById('form-note').value = '';
            } else if (mode === 'edit') {
                document.getElementById('modal-title').innerText = "แก้ไขรายการ";
                const txn = allTransactions.find(t => t.id === id);
                if (txn) {
                    document.getElementById('form-id').value = txn.id;
                    document.getElementById('form-type').value = txn.type;
                    updateCategories();
                    document.getElementById('form-category').value = txn.category;
                    document.getElementById('form-amount').value = txn.amount;
                    document.getElementById('form-date').value = txn.date.split('T')[0];
                    document.getElementById('form-note').value = txn.note;
                }
            }
        }

        function closeModal() {
            document.getElementById('tx-modal').classList.add('hidden');
            document.getElementById('tx-modal').classList.remove('flex');
        }

        // ส่งข้อมูลไปยัง Google Sheets API แบบเรียลไทม์ (CRUD)
        async function submitForm() {
            const id = document.getElementById('form-id').value;
            const type = document.getElementById('form-type').value;
            const category = document.getElementById('form-category').value;
            const amount = Number(document.getElementById('form-amount').value);
            const date = document.getElementById('form-date').value;
            const note = document.getElementById('form-note').value;

            if(!amount || !date) { alert('กรุณากรอกข้อมูลจำนวนเงินและวันที่ให้ครบถ้วน'); return; }

            closeModal();
            document.getElementById('loading-status').innerText = "กำลังบันทึกลงคลาวด์...";

            const payload = {
                action: id ? 'edit' : 'add',
                id: id,
                type: type,
                category: category,
                amount: amount,
                date: date,
                note: note
            };

            await fetch(GOOGLE_API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            fetchData();
        }

        async function deleteTransaction(id) {
            if(!confirm('คุณแน่ใจหรือไม่ว่าต้องการลบรายการนี้?')) return;
            document.getElementById('loading-status').innerText = "กำลังลบรายการ...";
            
            await fetch(GOOGLE_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id })
            });

            fetchData();
        }

        function exportToCSV() {
            let csv = 'ID,วันที่,ประเภท,หมวดหมู่,จำนวนเงิน,หมายเหตุ\n';
            allTransactions.forEach(t => {
                csv += `${t.id},${t.date.split('T')[0]},${t.type},${t.category},${t.amount},${t.note || ''}\n`;
            });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `Financial_Report_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function formatThaiDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: '2-digit' });
        }
    </script>
</body>
</html>
