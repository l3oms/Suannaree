<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชีรายรับ-รายจ่าย</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ซ่อนหน้าต่างๆ ไว้ก่อนเพื่อจัดการด้วย JS */
        .page { display: none; }
        .page.active { display: block; }
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="login-page" class="page active flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-900">เข้าสู่ระบบบัญชี</h2>
            <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="รหัสผ่าน" class="w-full mb-6 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="login()" class="w-full bg-blue-800 text-white p-3 rounded-lg font-semibold hover:bg-blue-900 transition">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="main-app" class="page p-4 pb-24 max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6 no-print">
            <h1 class="text-xl font-bold text-blue-900">สรุปผลการเงิน</h1>
            <button onclick="window.print()" class="text-sm bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">พิมพ์/PDF</button>
        </header>

        <div class="flex overflow-x-auto space-x-2 mb-6 no-print pb-2">
            <button class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">วันนี้</button>
            <button class="bg-white border px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">สัปดาห์</button>
            <button class="bg-white border px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">เดือน</button>
            <button class="bg-white border px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">6 เดือน</button>
            <button class="bg-white border px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap">1 ปี</button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-green-50 p-4 rounded-xl border border-green-100">
                <p class="text-xs text-green-600 mb-1">รายรับรวม</p>
                <p class="text-xl font-bold text-green-700">฿17,500</p>
            </div>
            <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                <p class="text-xs text-red-600 mb-1">รายจ่ายรวม</p>
                <p class="text-xl font-bold text-red-700">฿6,600</p>
            </div>
        </div>
        <div class="bg-blue-800 p-5 rounded-xl text-white mb-8 shadow-sm">
            <p class="text-sm text-blue-200 mb-1">กำไร/ขาดทุน สุทธิ</p>
            <p class="text-3xl font-bold">+ ฿10,900</p>
        </div>

        <div class="mb-4 flex justify-between items-end">
            <h3 class="font-bold text-gray-700">ประวัติรายการ</h3>
            <button class="text-xs text-blue-600 underline no-print">ส่งออก (CSV)</button>
        </div>
        <div class="space-y-3 bg-white p-4 rounded-xl shadow-sm border border-gray-50">
            <div class="flex justify-between items-center border-b pb-2">
                <div>
                    <p class="font-semibold text-gray-800">โอนเงินลูกค้า</p>
                    <p class="text-xs text-gray-500">01/06/2026 • เงินโอน</p>
                </div>
                <div class="text-right">
                    <p class="font-bold text-green-600">+12,500</p>
                    <div class="text-xs text-gray-400 mt-1 space-x-2 no-print">
                        <button class="hover:text-blue-500">แก้ไข</button>
                        <button class="hover:text-red-500">ลบ</button>
                    </div>
                </div>
            </div>
            <div class="flex justify-between items-center pb-2">
                <div>
                    <p class="font-semibold text-gray-800">ซื้อวัตถุดิบ</p>

                <div class="text-right">
                    <p class="font-bold text-red-500">-4,500</p>

                        <button class="hover:text-blue-500">แก้ไข</button>
                        <button class="hover:text-red-500">ลบ</button>
                    </div>
                </div>
            </div>
        </div>

        <button class="fixed bottom-6 right-6 bg-blue-800 text-white w-14 h-14 rounded-full shadow-lg text-3xl flex items-center justify-center hover:bg-blue-900 no-print">+</button>
    </div>

            if(user === 'admin' && pass === '1234') {

</body>
</html>
