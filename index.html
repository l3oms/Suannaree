<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการบัญชีและงบดุล — สรวลนารี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .print-padding { padding: 0 !important; }
            body { background: white; color: black; }
        }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen antialiased">

    <div class="bg-slate-950 border-b border-slate-800 sticky top-0 z-50 no-print shadow-lg">
        <div class="max-w-md mx-auto px-4 py-3.5 flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold tracking-wide text-white flex items-center space-x-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span>สรวลนารี FINANCIAL</span>
                </h1>
                <p id="loading-status" class="text-[11px] text-slate-400 mt-0.5">ระบบเสถียร: กำลังตรวจสอบฐานข้อมูล...</p>
            </div>
            <div class="flex space-x-1.5">
                <button onclick="window.print()" class="text-[11px] bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2 rounded-xl hover:bg-slate-700 transition">พิมพ์รายงาน</button>
                <button onclick="exportToCSV()" class="text-[11px] bg-emerald-700 text-white px-3 py-2 rounded-xl hover:bg-emerald-600 transition font-medium">ส่งออก CSV</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="max-w-md mx-auto p-4 pb-12 print-padding">
        
        <div class="mb-5 bg-gradient-to-b from-slate-950 to-slate-900 p-5 rounded-2xl border border-slate-800 shadow-md">
            <div class="text-center mb-4">
                <p class="text-xs text-slate-400 font-medium tracking-wider uppercase">สรุปงบดุลและกำไรสุทธิ</p>
                <p id="net-profit" class="text-3xl font-bold tracking-tight text-white mt-1">฿0.00</p>
                <div id="profit-badge" class="inline-flex items-center text-[10px] font-bold px-2.5 py-0.5 rounded-full mt-2 bg-slate-800 text-slate-300">
                    คำนวณตามจริง
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 border-t border-slate-800/60 pt-4">
                <div class="text-center">
                    <p class="text-[11px] font-medium text-slate-400 mb-0.5">รายรับรวม (Total Revenue)</p>
                    <p id="total-income" class="text-base font-bold text-emerald-400">฿0.00</p>
                </div>
                <div class="text-center border-l border-slate-800/60">
                    <p class="text-[11px] font-medium text-slate-400 mb-0.5">รายจ่ายรวม (Total Expense)</p>
                    <p id="total-expense" class="text-base font-bold text-rose-400">฿0.00</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 shadow-xl mb-6 no-print">
            <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                <h2 id="form-title" class="font-bold text-sm tracking-wide text-white uppercase">บันทึกธุรกรรมทางการเงิน</h2>
                <button onclick="resetForm()" id="cancel-edit-btn" class="hidden text-[11px] text-amber-400 font-semibold bg-amber-500/10 px-2.5 py-1 rounded-lg border border-amber-500/20">ยกเลิกแก้ไข</button>
            </div>
            
            <input type="hidden" id="form-id">
            
            <div class="grid grid-cols-2 gap-3 mb-3.5">
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1.5">ประเภทธุรกรรม</label>
                    <select id="form-type" onchange="updateCategories()" class="w-full p-2.5 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-emerald-500 bg-slate-900 text-white font-medium">
                        <option value="รายรับ">➕ รายรับ (Revenue)</option>
                        <option value="รายจ่าย">➖ รายจ่าย (Expense)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1.5">หมวดหมู่ทางบัญชี</label>
                    <select id="form-category" class="w-full p-2.5 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-emerald-500 bg-slate-900 text-white">
                        </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-3.5">
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1.5">วันที่ลงบันทึก</label>
                    <input type="date" id="form-date" class="w-full p-2.5 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-emerald-500 bg-slate-900 text-white">
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1.5">จำนวนเงินสุทธิ (บาท)</label>
                    <input type="number" id="form-amount" step="any" class="w-full p-2.5 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-emerald-500 bg-slate-900 text-white font-bold" placeholder="0.00">
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-[11px] font-semibold text-slate-400 mb-1.5">บันทึกข้อความ / หมายเหตุอ้างอิง</label>
                <input type="text" id="form-note" class="w-full p-2.5 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-emerald-500 bg-slate-900 text-slate-300" placeholder="ระบุรายละเอียด เช่น ค่าของสด, ยอดขายรอบค่ำ, ค่าแรงพาร์ทไทม์">
            </div>

            <button id="submit-btn" onclick="submitForm()" class="w-full bg-emerald-600 text-white p-3 rounded-xl font-bold hover:bg-emerald-500 transition text-sm shadow-md tracking-wider">
                ตรวจสอบและบันทึกข้อมูล
            </button>
        </div>

        <div id="filter-bar" class="flex overflow-x-auto space-x-2 mb-5 no-print pb-2 scrollbar-none">
            <button onclick="setFilter('day', this)" class="filter-btn bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap shadow-md">วันนี้</button>
            <button onclick="setFilter('week', this)" class="filter-btn bg-slate-900 border border-slate-800 text-slate-400 px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap hover:text-white transition">7 วันที่ผ่านมา</button>
            <button onclick="setFilter('month', this)" class="filter-btn bg-slate-900 border border-slate-800 text-slate-400 px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap hover:text-white transition">รอบบัญชีเดือนนี้</button>
            <button onclick="setFilter('half-year', this)" class="filter-btn bg-slate-900 border border-slate-800 text-slate-400 px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap hover:text-white transition">รอบครึ่งปี</button>
            <button onclick="setFilter('year', this)" class="filter-btn bg-slate-900 border border-slate-800 text-slate-400 px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap hover:text-white transition">สรุปรายปี</button>
        </div>

        <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-slate-300 text-xs tracking-wider uppercase">สมุดรายวันประจำร้านและประวัติรายการ</h3>
            <span id="transaction-count" class="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded-md font-mono">0 รายการ</span>
        </div>

        <div id="transaction-list" class="space-y-2.5">
            </div>

    </div>

    <script>
        // ==========================================
        // https://script.google.com/macros/s/AKfycbxz0AxBfFLpim7nh8mgM5bEuH7dmdVG1G7-ts-UBWvY6a-t16kBp0ui0OZdIKYo7wXLDg/exec
        // ==========================================
        const GOOGLE_API_URL = "วาง_URL_เว็บแอปของคุณตรงนี้";
        
        let allTransactions = [];
        let currentFilter = 'day';

        const categoriesData = {
            'รายรับ': ['ยอดขายหน้าร้าน (เงินสด)', 'ยอดขายหน้าร้าน (เงินโอน)', 'ยอดขายเดลิเวอรี่', 'รายรับอื่นๆ'],
            'รายจ่าย': ['ค่าแรง/พนักงาน', 'วัตถุดิบ/ตลาด', 'ค่าน้ำไฟ/สาธารณูปโภค', 'ค่าเช่าสถานที่', 'ค่าการตลาด/โฆษณา', 'ค่าซ่อมบำรุง', 'รายจ่ายอื่นๆ']
        };

        function updateCategories() {
            const type = document.getElementById('form-type').value;
            const catSelect = document.getElementById('form-category');
            catSelect.innerHTML = '';
            categoriesData[type].forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.innerText = c;
                catSelect.appendChild(opt);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            updateCategories();
            if(GOOGLE_API_URL !== "วาง_URL_เว็บแอปของคุณตรงนี้") {
                fetchData();
            } else {
                document.getElementById('loading-status').innerHTML = `<span class="text-amber-400">⚠️ กรุณาใส่ URL เว็บแอปในโค้ดก่อนใช้งาน</span>`;
            }
        });

        async function fetchData() {
            document.getElementById('loading-status').innerHTML = `<span class="text-amber-400 animate-pulse">🔄 กำลังซิงค์ข้อมูลกับบัญชีคลาวด์...</span>`;
            try {
                const response = await fetch(GOOGLE_API_URL);
                allTransactions = await response.json();
                renderApp();
                document.getElementById('loading-status').innerHTML = `<span class="text-emerald-400">● เชื่อมต่อกูเกิลชีตสมบูรณ์</span>`;
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loading-status').innerHTML = `<span class="text-rose-400">✕ การเชื่อมต่อขัดข้อง (กรุณาเช็ก API URL)</span>`;
            }
        }

        function setFilter(filterType, btnElement) {
            currentFilter = filterType;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn bg-slate-900 border border-slate-800 text-slate-400 px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap hover:text-white transition";
            });
            btnElement.className = "filter-btn bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs font-semibold whitespace-nowrap shadow-md";
            renderApp();
        }

        function renderApp() {
            const now = new Date();
            const filtered = allTransactions.filter(txn => {
                const txnDate = new Date(txn.date);
                const diffTime = now - txnDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (currentFilter === 'day') return now.toDateString() === txnDate.toDateString();
                if (currentFilter === 'week') return diffDays <= 7;
                if (currentFilter === 'month') return now.getMonth() === txnDate.getMonth() && now.getFullYear() === txnDate.getFullYear();
                if (currentFilter === 'half-year') return diffDays <= 182;
                if (currentFilter === 'year') return diffDays <= 365;
                return true;
            });

            document.getElementById('transaction-count').innerText = `${filtered.length} รายการ`;
            let income = 0; let expense = 0;
            const listContainer = document.getElementById('transaction-list');
            listContainer.innerHTML = '';

            filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(txn => {
                const isIncome = txn.type === 'รายรับ';
                if (isIncome) income += txn.amount; else expense += txn.amount;

                const item = document.createElement('div');
                item.className = "bg-slate-950 p-4 rounded-xl border border-slate-800/80 shadow-sm flex justify-between items-center hover:border-slate-700 transition";
                item.innerHTML = `
                    <div class="pr-2">
                        <div class="flex items-center space-x-2 flex-wrap gap-y-1">
                            <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase tracking-wider ${isIncome ? 'bg-emerald-950 text-emerald-400 border border-emerald-900/50' : 'bg-rose-950 text-rose-400 border border-rose-900/50'}">${txn.category}</span>
                            <span class="text-[10px] text-slate-500 font-mono">${formatThaiDate(txn.date)}</span>
                        </div>
                        <p class="font-medium text-slate-200 text-sm mt-1.5 tracking-wide">${txn.note || '-'}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <p class="font-mono font-bold text-sm ${isIncome ? 'text-emerald-400' : 'text-rose-400'}">
                            ${isIncome ? '+' : '-'}฿${txn.amount.toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </p>
                        <div class="text-[10px] font-semibold mt-2 space-x-2.5 no-print">
                            <button onclick="editTransaction('${txn.id}')" class="text-slate-400 hover:text-amber-400 transition">📝 แก้ไข</button>
                            <button onclick="deleteTransaction('${txn.id}')" class="text-slate-500 hover:text-rose-400 transition">🗑️ ลบ</button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(item);
            });

            if(filtered.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-xs text-slate-500 py-8 border border-dashed border-slate-800 rounded-xl">ไม่มีรายการข้อมูลในช่วงรอบเวลานี้</p>`;
            }

            const net = income - expense;
            document.getElementById('total-income').innerText = `฿${income.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('total-expense').innerText = `฿${expense.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            const netProfitEl = document.getElementById('net-profit');
            const profitBadge = document.getElementById('profit-badge');
            netProfitEl.innerText = `${net >= 0 ? '+' : ''}฿${net.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            
            if (net >= 0) {
                netProfitEl.className = "text-3xl font-bold tracking-tight text-emerald-400 mt-1";
                profitBadge.className = "inline-flex items-center text-[10px] font-bold px-2.5 py-0.5 rounded-full mt-2 bg-emerald-950 text-emerald-400 border border-emerald-900";
                profitBadge.innerText = "สถานะ: กำไรสุทธิ (Surplus)";
            } else {
                netProfitEl.className = "text-3xl font-bold tracking-tight text-rose-400 mt-1";
                profitBadge.className = "inline-flex items-center text-[10px] font-bold px-2.5 py-0.5 rounded-full mt-2 bg-rose-950 text-rose-400 border border-rose-900";
                profitBadge.innerText = "สถานะ: ขาดทุนสุทธิ (Deficit)";
            }
        }

        async function submitForm() {
            const id = document.getElementById('form-id').value;
            const type = document.getElementById('form-type').value;
            const category = document.getElementById('form-category').value;
            const amount = Number(document.getElementById('form-amount').value);
            const date = document.getElementById('form-date').value;
            const note = document.getElementById('form-note').value;

            if(!amount || !date) { 
                alert('ระบบปฏิเสธ: กรุณากรอกจำนวนเงินและระบุวันที่ให้ถูกต้อง'); 
                document.getElementById('form-amount').focus();
                return; 
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "กำลังตรวจสอบความถูกต้องระบบ...";
            document.getElementById('loading-status').innerHTML = `<span class="text-amber-400 animate-pulse">💾 กำลังบันทึกธุรกรรมลงกูเกิลชีต...</span>`;

            try {
                await fetch(GOOGLE_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: id ? 'edit' : 'add', id, type, category, amount, date, note })
                });
                resetForm();
                await fetchData();
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการส่งข้อมูล');
            } finally {
                btn.disabled = false;
            }
        }

        function editTransaction(id) {
            const txn = allTransactions.find(t => t.id === id);
            if (txn) {
                document.getElementById('form-title').innerText = "แก้ไขข้อมูลธุรกรรม (ID: " + txn.id + ")";
                document.getElementById('form-id').value = txn.id;
                document.getElementById('form-type').value = txn.type;
                updateCategories();
                document.getElementById('form-category').value = txn.category;
                document.getElementById('form-amount').value = txn.amount;
                document.getElementById('form-date').value = txn.date.split('T')[0];
                document.getElementById('form-note').value = txn.note;
                
                document.getElementById('submit-btn').innerText = "ยืนยันการแก้ไขตัวเลข";
                document.getElementById('submit-btn').className = "w-full bg-amber-600 text-white p-3 rounded-xl font-bold hover:bg-amber-500 transition text-sm shadow-md tracking-wider";
                document.getElementById('cancel-edit-btn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "บันทึกธุรกรรมทางการเงิน";
            document.getElementById('form-id').value = '';
            document.getElementById('form-amount').value = '';
            document.getElementById('form-note').value = '';
            document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('submit-btn').innerText = "ตรวจสอบและบันทึกข้อมูล";
            document.getElementById('submit-btn').className = "w-full bg-emerald-600 text-white p-3 rounded-xl font-bold hover:bg-emerald-500 transition text-sm shadow-md tracking-wider";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }

        async function deleteTransaction(id) {
            if(!confirm('🚨 คำเตือนความปลอดภัย: คุณแน่ใจว่าต้องการลบรายการนี้ออกจากระบบบัญชีถาวรใช่หรือไม่?')) return;
            document.getElementById('loading-status').innerHTML = `<span class="text-rose-400 animate-pulse">🗑️ กำลังลบข้อมูลบนระบบคลาวด์...</span>`;
            try {
                await fetch(GOOGLE_API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'delete', id })
                });
                fetchData();
            } catch (err) {
                alert('ไม่สามารถลบข้อมูลได้เนื่องจากเครือข่ายขัดข้อง');
            }
        }

        function exportToCSV() {
            let csv = 'ID,วันที่,ประเภท,หมวดหมู่,จำนวนเงิน,หมายเหตุ\n';
            allTransactions.forEach(t => {
                csv += `${t.id},${t.date.split('T')[0]},${t.type},${t.category},${t.amount},${t.note || ''}\n`;
            });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `รายงานบัญชี_สรวลนารี_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function formatThaiDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: '2-digit' });
        }
    </script>
</body>
</html>
